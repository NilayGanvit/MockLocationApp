name: Publish Package to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias mocklocation-key -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Nilay Ganvit, O=NilayGanvit, C=US" -storepass "mocklocation123" -keypass "mocklocation123"
          echo "storeFile=../release.keystore" > keystore.properties
          echo "storePassword=mocklocation123" >> keystore.properties
          echo "keyAlias=mocklocation-key" >> keystore.properties
          echo "keyPassword=mocklocation123" >> keystore.properties

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Publish Package
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gradle publishReleasePublicationToGitHubPackagesRepository
