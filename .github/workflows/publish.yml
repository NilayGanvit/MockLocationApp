name: Publish Package to GitHub Packages

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.1)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Determine Version
        id: get_version
        run: |
          VERSION=""
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          if [ -z "$VERSION" ]; then
            # Auto-bump logic on push or empty manual run
            git fetch --tags --force
            LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n1)
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v1.0.1"
            fi
            echo "Latest tag: $LATEST_TAG"
            VERSION_NUM="${LATEST_TAG#v}"
            IFS='.' read -r major minor patch <<< "$VERSION_NUM"
            major=${major:-1}
            minor=${minor:-0}
            patch=${patch:-0}
            new_patch=$((patch + 1))
            VERSION="$major.$minor.$new_patch"
          fi
          
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias mocklocation-key -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Nilay Ganvit, O=NilayGanvit, C=US" -storepass "mocklocation123" -keypass "mocklocation123"
          echo "storeFile=../release.keystore" > keystore.properties
          echo "storePassword=mocklocation123" >> keystore.properties
          echo "keyAlias=mocklocation-key" >> keystore.properties
          echo "keyPassword=mocklocation123" >> keystore.properties

      - name: Build Release APK
        run: gradle assembleRelease -PprojVersion=${{ steps.get_version.outputs.version }}

      - name: Publish Package
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gradle publishReleasePublicationToGitHubPackagesRepository -PprojVersion=${{ steps.get_version.outputs.version }}

      - name: Create and Push Tag
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.version == '')
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG_NAME="v$VERSION"
          echo "Creating and pushing tag $TAG_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
